<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zeta Beta Mu Fraternity - Member Login. Access the private portal.">
  <title>Member Login | Zeta Beta Mu Fraternity</title>

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="css/tailwind.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.min.css">
</head>
<body class="dark-theme auth-page login-page">

  <!-- ============================================
       GOLD STARDUST BACKGROUND ANIMATION
       ============================================ -->
  <div class="stardust-container">
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
    <div class="stardust-particle"></div>
  </div>
  <!-- Gold Dust Overlay -->
  <div class="stardust-overlay"></div>

  <!-- ============================================
       NAVIGATION BAR
       ============================================ -->
  <nav class="landing-navbar" style="opacity: 1; transform: translateY(0);">
    <div class="landing-navbar-inner">
      <a href="index.html" class="landing-navbar-logo">
        <div class="landing-navbar-logo-icon">
          <img src="image/logo1.png" alt="ZBM Logo" class="landing-logo-img">
        </div>
        <span class="font-serif font-semibold text-lg">Zeta Beta Mu</span>
      </a>
      <div class="landing-navbar-actions">
        <button class="navbar-theme-toggle" type="button" aria-label="Toggle dark mode">
          <i data-lucide="sun" class="navbar-theme-icon navbar-theme-icon-sun"></i>
          <i data-lucide="moon" class="navbar-theme-icon navbar-theme-icon-moon"></i>
        </button>
        <a href="index.html" class="btn btn-glass btn-sm">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Back to Home
        </a>
      </div>
    </div>
  </nav>

  <!-- ============================================
       LOGIN SECTION
       ============================================ -->
  <section class="login-section">
    <div class="login-section-inner">
      <div class="glass-heavy auth-card">

        <!-- Logo -->
        <div class="auth-logo">
          <img src="image/logo1.png" alt="ZBM Logo" class="auth-logo-img">
        </div>

        <!-- Title -->
        <h2 class="auth-title">Member Login</h2>
        <p class="auth-motto">Access the private portal</p>

        <!-- Error Message Container -->
        <div id="auth-error" class="hidden mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/30 text-red-300 text-sm"></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">

          <!-- Username Field -->
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
              <input
                type="text"
                id="username"
                name="username"
                class="glass-input pl-10"
                placeholder="Enter your username"
                autocomplete="username"
                required
              >
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
              <input
                type="password"
                id="password"
                name="password"
                class="glass-input pl-10"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button
                type="button"
                id="toggle-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors"
                onclick="togglePasswordVisibility()"
              >
                <i data-lucide="eye" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <!-- Form Options -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember-me" name="remember-me">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password hover:text-[#d4af37] transition-colors">Forgot Password?</a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="btn btn-gold btn-lg w-full"
            data-original-text="Login"
          >
            <i data-lucide="log-in" class="w-5 h-5"></i>
            Login
          </button>

        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>New to the fraternity?</span>
        </div>

        <!-- Register Link -->
        <a href="signup.html" class="btn btn-glass w-full">
          <i data-lucide="user-plus" class="w-5 h-5"></i>
          Create Account
        </a>

      </div>
    </div>
  </section>


  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Password visibility toggle
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('toggle-password');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.innerHTML = '<i data-lucide="eye-off" class="w-5 h-5"></i>';
      } else {
        passwordInput.type = 'password';
        toggleBtn.innerHTML = '<i data-lucide="eye" class="w-5 h-5"></i>';
      }

      lucide.createIcons();
    }

    // Initialize icons
    lucide.createIcons();
  </script>

</body>
</html>
